app = "corpus-worker-document-indexing"
primary_region = "iad"

[build]
  dockerfile = "backend/workers/Dockerfile"

[processes]
  worker = "python -m workers.run_document_indexing_worker"

[env]
  ENVIRONMENT = "production"
  STORAGE_PROVIDER = "s3"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

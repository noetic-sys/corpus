app = "corpus-api"
primary_region = "iad"

[build]
  dockerfile = "backend/api/Dockerfile"
  build-context = "."

[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  path = "/healthz"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"

[env]
  ENVIRONMENT = "production"
  STORAGE_PROVIDER = "s3"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

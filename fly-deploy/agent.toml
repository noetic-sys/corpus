app = "corpus-agent"
primary_region = "iad"

[build]
  dockerfile = "backend/api/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[http_service.checks]]
  path = "/healthz"
  interval = 30000
  timeout = 5000
  grace_period = "10s"

[env]
  ENVIRONMENT = "production"
  STORAGE_PROVIDER = "s3"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

{{- if and .Values.api.enabled .Values.api.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "corpus.fullname" . }}-api
  labels:
    {{- include "corpus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- with .Values.api.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.api.ingress.className }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  {{- if .Values.api.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.api.ingress.host }}
      secretName: {{ .Values.api.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.api.ingress.host }}
      http:
        paths:
          # Only route /api prefix - health endpoints (/healthz) are internal only
          # Note: Agent/WebSocket routes are handled by the agent service ingress
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "corpus.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
